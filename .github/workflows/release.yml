name: Release

on:
  push:
    tags:
      - 'v*'

env:
  CARGO_TERM_COLOR: always
  BINARY_NAME: Serpantoxide

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact: serpantoxide-linux-x86_64
            ext: ""
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact: serpantoxide-macos-aarch64
            ext: ""
          - os: macos-13
            target: x86_64-apple-darwin
            artifact: serpantoxide-macos-x86_64
            ext: ""

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache dependencies
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Build release binary
        run: cargo build --release --target ${{ matrix.target }}

      - name: Stage binary (Unix)
        run: |
          cp "target/${{ matrix.target }}/release/${BINARY_NAME}" "${{ matrix.artifact }}"
          chmod +x "${{ matrix.artifact }}"

      - name: Package macOS .app bundle
        if: runner.os == 'macOS'
        run: |
          bash scripts/package_macos_app.sh \
            --target ${{ matrix.target }} \
            --out-dir dist \
            --skip-build \
            --zip
          cp "dist/${BINARY_NAME}.zip" "${{ matrix.artifact }}-app.zip"

      - name: Upload binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}
          retention-days: 1

      - name: Upload macOS .app artifact
        if: runner.os == 'macOS'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}-app
          path: ${{ matrix.artifact }}-app.zip
          retention-days: 1

  release:
    name: Publish GitHub Release
    needs: build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Flatten artifact tree
        run: |
          mkdir -p release_assets
          find artifacts -type f | while read f; do
            cp "$f" "release_assets/$(basename "$f")"
          done
          ls -lh release_assets/

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"

      - name: Generate release notes
        id: notes
        run: |
          cat <<'EOF' > release_notes.md
          ## Serpantoxide ${{ steps.version.outputs.version }}

          A Rust command centre for autonomous security operations.

          ### Downloads

          | Platform | Binary | App Bundle |
          |----------|--------|------------|
          | Linux x86_64 | `serpantoxide-linux-x86_64` | — |
          | macOS Apple Silicon | `serpantoxide-macos-aarch64` | `serpantoxide-macos-aarch64-app.zip` |
          | macOS Intel | `serpantoxide-macos-x86_64` | `serpantoxide-macos-x86_64-app.zip` |

          ### Quick Start

          ```bash
          chmod +x serpantoxide-linux-x86_64
          ./serpantoxide-linux-x86_64
          ```

          See [README](https://github.com/${{ github.repository }}/blob/main/README.md) for full setup instructions.
          EOF

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: Serpantoxide ${{ steps.version.outputs.version }}
          body_path: release_notes.md
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
          files: release_assets/*
          fail_on_unmatched_files: false
